---
- hosts: all
  become: yes
  tasks:
     - name: Update apt cache
      apt: update_cache=yes

    - name: Upgrade all packages
      apt: upgrade=dist

    - name: Auto-remove unused packages
      apt: autoremove=yes

     - name: Reboot if necessary
      reboot:
        msg: "Reboot initiated by Ansible"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
