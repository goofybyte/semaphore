---
- name: Update & Upgrade
  hosts: all
  become: true
  become_method: sudo
  become_user: admin
  tasks:
    - name: Update apt cache
      apt: update_cache=yes
      #become: yes

    - name: Upgrade all packages
      apt: upgrade=dist
      #become: yes

    - name: Auto-remove unused packages
      apt: autoremove=yes
      #become: yes

    - name: Reboot if necessary
      reboot:
        msg: "Reboot initiated by Ansible"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
      #become: yes
